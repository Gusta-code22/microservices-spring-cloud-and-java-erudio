version: '3.8' # Certifique-se de manter a versão caso necessário

services:
  book-service:
    image: gustadev22/book-service
    restart: always
    build:
      context: ./book-service
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/book_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&enabledTLSProtocols=TLSv1.2
      SPRING_DATASOURCE_USER: docker
      SPRING_DATASOURCE_PASSWORD: admin123
    ports:
      - 8100:8100
    networks:
      - gustadev-network

  exchange-service:
    image: gustadev22/exchange-service
    restart: always
    build:
      context: ./exchange-service
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: America/Sao_Paulo
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/exchange_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&enabledTLSProtocols=TLSv1.2
      SPRING_DATASOURCE_USERNAME: docker
      SPRING_DATASOURCE_PASSWORD: admin123
    ports:
      - 8000:8000
    networks:
      - gustadev-network

networks:
  gustadev-network:
    name: gustadev-network
    driver: bridge
